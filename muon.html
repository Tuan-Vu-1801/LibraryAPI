<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tạo phiếu mượn — Thư viện</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="brand"><i class="bi bi-book-half"></i> Thư viện</a>
        <a href="index.html" class="nav-link"><i class="bi bi-grid-3x3-gap"></i> Danh sách sách</a>
        <a href="muon.html" class="nav-link active"><i class="bi bi-plus-circle"></i> Tạo phiếu mượn</a>
        <a href="lichsu.html" class="nav-link"><i class="bi bi-clock-history"></i> Lịch sử</a>
        <a href="dashboard.html" class="nav-link"><i class="bi bi-bar-chart-line"></i> Dashboard</a>
    </nav>

    <div class="page-header">
        <div class="container">
            <h2><i class="bi bi-plus-circle"></i> Tạo phiếu mượn</h2>
        </div>
    </div>

    <div class="main-content">
        <div class="container">

            <div id="alertBox" class="alert"></div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px">

                <div class="card">
                    <div class="card-header"><h5><i class="bi bi-person"></i> Thông tin mượn</h5></div>
                    <div class="card-body">
                        <div style="margin-bottom:16px">
                            <label class="form-label">Sinh viên</label>
                            <select id="selSinhVien" class="form-control"></select>
                        </div>
                        <div>
                            <label class="form-label">Ngày hẹn trả</label>
                            <input type="date" id="ngayHenTra" class="form-control">
                        </div>
                    </div>
                </div>

                <div class="card" style="background:linear-gradient(135deg,#1e3a5f,#2a5298);border:none">
                    <div class="card-body" style="display:flex;flex-direction:column;justify-content:center;height:100%">
                        <p style="color:rgba(255,255,255,.7);font-size:13px;margin-bottom:8px">Quy định mượn sách</p>
                        <div style="color:#fff;font-size:14px;line-height:2">
                            <div><i class="bi bi-check-circle" style="color:#86efac"></i> Tối đa <strong>5 cuốn</strong> cùng lúc</div>
                            <div><i class="bi bi-check-circle" style="color:#86efac"></i> Hạn trả mặc định <strong>14 ngày</strong></div>
                            <div><i class="bi bi-exclamation-circle" style="color:#fca5a5"></i> Trả trễ: <strong>5.000đ/ngày</strong></div>
                        </div>
                    </div>
                </div>

            </div>

            <div class="card">
                <div class="card-header">
                    <h5><i class="bi bi-list-ul"></i> Danh sách sách mượn</h5>
                    <button class="btn btn-outline btn-sm" onclick="themDong()">
                        <i class="bi bi-plus-lg"></i> Thêm sách
                    </button>
                </div>
                <div class="card-body" style="padding:0">
                    <table>
                        <thead>
                            <tr>
                                <th>Sách</th>
                                <th style="width:140px">Số lượng</th>
                                <th style="width:60px"></th>
                            </tr>
                        </thead>
                        <tbody id="tableSachMuon"></tbody>
                    </table>
                </div>
            </div>

            <button class="btn btn-success" style="width:100%;padding:14px;font-size:16px;border-radius:10px" onclick="taoPhieu()">
                <i class="bi bi-check2-circle"></i> Xác nhận tạo phiếu mượn
            </button>

        </div>
    </div>

    <script src="api.js"></script>
    <script>
        let danhSachSach = [];

        async function loadData() {
            const [svList, sachList] = await Promise.all([api.get('/sinhvien'), api.get('/sach')]);
            danhSachSach = sachList;
            const selSV = document.getElementById('selSinhVien');
            svList.forEach(sv => {
                const opt = document.createElement('option');
                opt.value = sv.maSV;
                opt.textContent = `${sv.maSV} — ${sv.hoTen}`;
                selSV.appendChild(opt);
            });
            const d = new Date();
            d.setDate(d.getDate() + 14);
            document.getElementById('ngayHenTra').value = d.toISOString().split('T')[0];
            themDong();
        }

        function taoSachOptions(sel = '') {
            return danhSachSach.map(s =>
                `<option value="${s.maSach}" ${s.maSach === sel ? 'selected' : ''}>${s.tenSach} (còn ${s.soLuongTon})</option>`
            ).join('');
        }

        function themDong() {
            const tbody = document.getElementById('tableSachMuon');
            const tr = document.createElement('tr');
            tr.innerHTML = `
            <td><select class="form-control" style="padding:8px 12px">${taoSachOptions()}</select></td>
            <td>
                <div style="display:flex;align-items:center;gap:8px">
                    <button class="btn btn-outline btn-sm" onclick="changeQty(this,-1)" style="width:30px;padding:4px;justify-content:center">−</button>
                    <input type="number" value="1" min="1" max="10" class="form-control" style="width:60px;text-align:center;padding:6px">
                    <button class="btn btn-outline btn-sm" onclick="changeQty(this,1)" style="width:30px;padding:4px;justify-content:center">+</button>
                </div>
            </td>
            <td><button class="btn btn-danger btn-sm" onclick="this.closest('tr').remove()"><i class="bi bi-trash"></i></button></td>
        `;
            tbody.appendChild(tr);
        }

        function changeQty(btn, delta) {
            const input = btn.closest('td').querySelector('input');
            input.value = Math.max(1, Math.min(10, parseInt(input.value) + delta));
        }

        function showAlert(msg, type) {
            const box = document.getElementById('alertBox');
            box.className = `alert alert-${type}`;
            box.innerHTML = `<i class="bi bi-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${msg}`;
            box.style.display = 'flex';
            setTimeout(() => box.style.display = 'none', 4000);
        }

        async function taoPhieu() {
            const maSV = document.getElementById('selSinhVien').value;
            const ngayHenTra = document.getElementById('ngayHenTra').value;
            if (!ngayHenTra) { showAlert('Vui lòng chọn ngày hẹn trả!', 'danger'); return; }
            const rows = document.querySelectorAll('#tableSachMuon tr');
            if (rows.length === 0) { showAlert('Vui lòng thêm ít nhất 1 sách!', 'danger'); return; }
            const chiTiets = Array.from(rows).map(tr => ({
                maSach: tr.querySelector('select').value,
                soLuong: parseInt(tr.querySelector('input').value)
            }));
            const res = await api.post('/phieumuon', { maSV, ngayHenTra, chiTiets });
            if (res.ok) {
                showAlert('Tạo phiếu mượn thành công!', 'success');
                document.getElementById('tableSachMuon').innerHTML = '';
                await loadData();
            } else {
                const err = await res.json();
                showAlert(err.message || 'Lỗi không xác định', 'danger');
            }
        }

        loadData();
    </script>
</body>
</html>
