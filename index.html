<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Danh sách sách — Thư viện</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="brand">
            <i class="bi bi-book-half"></i> Thư viện
        </a>
        <a href="index.html" class="nav-link active"><i class="bi bi-grid-3x3-gap"></i> Danh sách sách</a>
        <a href="muon.html" class="nav-link"><i class="bi bi-plus-circle"></i> Tạo phiếu mượn</a>
        <a href="lichsu.html" class="nav-link"><i class="bi bi-clock-history"></i> Lịch sử</a>
        <a href="dashboard.html" class="nav-link"><i class="bi bi-bar-chart-line"></i> Dashboard</a>
    </nav>

    <div class="page-header">
        <div class="container">
            <h2><i class="bi bi-collection"></i> Danh sách sách</h2>
        </div>
    </div>

    <div class="main-content">
        <div class="container">

            <div class="card">
                <div class="card-header">
                    <h5><i class="bi bi-funnel"></i> Tìm kiếm & lọc</h5>
                    <span id="countLabel" style="font-size:13px;color:#64748b"></span>
                </div>
                <div class="card-body" style="padding:16px 24px">
                    <div class="toolbar">
                        <div class="search-box">
                            <i class="bi bi-search"></i>
                            <input type="text" id="search" placeholder="Tìm theo tên sách...">
                        </div>
                        <select id="filterTheLoai" class="filter-select">
                            <option value="">Tất cả thể loại</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="card">
                <table>
                    <thead>
                        <tr>
                            <th>Mã sách</th>
                            <th>Tên sách</th>
                            <th>Tác giả</th>
                            <th>Thể loại</th>
                            <th style="text-align:center">Tồn kho</th>
                        </tr>
                    </thead>
                    <tbody id="tableSach"></tbody>
                </table>
            </div>

        </div>
    </div>

    <script src="api.js"></script>
    <script>
        let danhSachSach = [];

        async function loadTheLoai() {
            const list = await api.get('/theloai');
            const sel = document.getElementById('filterTheLoai');
            list.forEach(t => {
                const opt = document.createElement('option');
                opt.value = t.maTheLoai;
                opt.textContent = t.tenTheLoai;
                sel.appendChild(opt);
            });
        }

        async function loadSach() {
            danhSachSach = await api.get('/sach');
            renderTable(danhSachSach);
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableSach');
            document.getElementById('countLabel').textContent = `${data.length} đầu sách`;
            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state"><i class="bi bi-inbox"></i><p>Không tìm thấy sách phù hợp</p></div></td></tr>`;
                return;
            }
            tbody.innerHTML = data.map(s => {
                let tonKho;
                if (s.soLuongTon === 0) tonKho = `<span class="ton-kho-badge none"><i class="bi bi-x"></i></span>`;
                else if (s.soLuongTon <= 2) tonKho = `<span class="ton-kho-badge low">${s.soLuongTon}</span>`;
                else tonKho = `<span class="ton-kho-badge ok">${s.soLuongTon}</span>`;
                return `<tr>
                <td><span style="font-family:monospace;font-size:12px;background:#f1f5f9;padding:2px 8px;border-radius:4px">${s.maSach}</span></td>
                <td><strong style="font-size:14px">${s.tenSach}</strong></td>
                <td style="color:#64748b">${s.tacGia}</td>
                <td><span class="badge badge-info">${s.theLoai?.tenTheLoai ?? ''}</span></td>
                <td style="text-align:center">${tonKho}</td>
            </tr>`;
            }).join('');
        }

        function filterData() {
            const search = document.getElementById('search').value.toLowerCase();
            const maTheLoai = document.getElementById('filterTheLoai').value;
            const filtered = danhSachSach.filter(s =>
                s.tenSach.toLowerCase().includes(search) &&
                (maTheLoai === '' || s.maTheLoai == maTheLoai)
            );
            renderTable(filtered);
        }

        document.getElementById('search').addEventListener('input', filterData);
        document.getElementById('filterTheLoai').addEventListener('change', filterData);
        loadTheLoai();
        loadSach();
    </script>
</body>
</html>
